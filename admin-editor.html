<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article Builder — Vodouizan Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #020c10;
      --bg2:     #040f15;
      --bg3:     #071820;
      --border:  #1a3a3a;
      --cyan:    #5ee8e8;
      --cyan-dk: #2ab8b8;
      --text:    #d0e8e8;
      --muted:   #4a6a6a;
      --danger:  #e85e5e;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; }

    /* ── Layout ── */
    .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.5rem; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--muted); text-decoration: none; font-size: 0.8rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--cyan); }
    header h1 { font-size: 0.95rem; font-weight: 600; color: var(--cyan); }
    .header-actions { display: flex; gap: 0.6rem; }
    .btn {
      padding: 0.5rem 1rem; border-radius: 7px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
      font-family: inherit;
    }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }
    .btn-primary { background: var(--cyan); color: var(--bg); }
    .btn-primary:hover { background: var(--cyan-dk); }
    .btn-danger { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Main Grid ── */
    .main { display: grid; grid-template-columns: 1fr 340px; height: 100%; overflow: hidden; }

    /* ── Editor Column ── */
    .editor-col { display: flex; flex-direction: column; overflow-y: auto; padding: 2rem; gap: 1.25rem; }

    .field-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .field-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

    .title-input {
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      color: var(--text); font-size: 2rem; font-weight: 700; font-family: inherit;
      padding: 0.5rem 0; width: 100%; outline: none; line-height: 1.2;
      transition: border-color 0.2s;
    }
    .title-input::placeholder { color: var(--muted); }
    .title-input:focus { border-color: var(--cyan); }

    .excerpt-input {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.9rem; font-family: inherit;
      padding: 0.75rem 1rem; width: 100%; outline: none; resize: vertical;
      min-height: 70px; transition: border-color 0.2s; line-height: 1.6;
    }
    .excerpt-input::placeholder { color: var(--muted); }
    .excerpt-input:focus { border-color: var(--cyan); }

    /* ── Cover Image ── */
    .cover-drop {
      border: 2px dashed var(--border); border-radius: 10px;
      min-height: 180px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.5rem;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .cover-drop:hover, .cover-drop.drag-over { border-color: var(--cyan); background: rgba(94,232,232,0.03); }
    .cover-drop .drop-icon { font-size: 2rem; opacity: 0.4; }
    .cover-drop .drop-label { font-size: 0.82rem; color: var(--muted); }
    .cover-drop .drop-sub { font-size: 0.72rem; color: var(--muted); opacity: 0.6; }
    .cover-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .cover-preview {
      width: 100%; height: 220px; object-fit: cover; border-radius: 8px;
      display: none;
    }
    .cover-remove {
      position: absolute; top: 0.5rem; right: 0.5rem;
      background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
      width: 28px; height: 28px; display: none; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 0.8rem; z-index: 2;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 0.25rem;
      padding: 0.6rem 0.75rem; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 8px 8px 0 0;
    }
    .toolbar-btn {
      padding: 0.3rem 0.55rem; border-radius: 5px; border: none;
      background: transparent; color: var(--muted); font-size: 0.82rem;
      cursor: pointer; font-family: inherit; font-weight: 600;
      transition: all 0.15s; white-space: nowrap;
    }
    .toolbar-btn:hover { background: var(--bg3); color: var(--cyan); }
    .toolbar-btn.active { background: rgba(94,232,232,0.12); color: var(--cyan); }
    .toolbar-sep { width: 1px; background: var(--border); margin: 0 0.1rem; align-self: stretch; }

    .rich-editor {
      background: var(--bg2); border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 8px 8px; padding: 1.25rem;
      min-height: 320px; outline: none; line-height: 1.8;
      color: var(--text); font-size: 0.95rem;
      overflow-y: auto;
    }
    .rich-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--muted); pointer-events: none;
    }
    .rich-editor h1 { font-size: 1.6rem; margin: 1rem 0 0.5rem; color: #fff; }
    .rich-editor h2 { font-size: 1.25rem; margin: 0.75rem 0 0.4rem; color: #fff; }
    .rich-editor h3 { font-size: 1.05rem; margin: 0.6rem 0 0.3rem; color: var(--cyan); }
    .rich-editor p { margin-bottom: 0.75rem; }
    .rich-editor blockquote {
      border-left: 3px solid var(--cyan); padding-left: 1rem;
      color: var(--muted); font-style: italic; margin: 0.75rem 0;
    }
    .rich-editor ul, .rich-editor ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .rich-editor a { color: var(--cyan); }
    .rich-editor strong { color: #fff; }

    /* ── Tags ── */
    .tags-input {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.85rem; font-family: inherit;
      padding: 0.65rem 1rem; width: 100%; outline: none;
      transition: border-color 0.2s;
    }
    .tags-input::placeholder { color: var(--muted); }
    .tags-input:focus { border-color: var(--cyan); }

    /* ── AI Sidebar ── */
    .ai-col {
      border-left: 1px solid var(--border); display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg2);
    }
    .ai-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .ai-header h2 { font-size: 0.9rem; font-weight: 700; color: var(--cyan); display: flex; align-items: center; gap: 0.5rem; }
    .ai-badge {
      font-size: 0.65rem; background: rgba(94,232,232,0.12);
      border: 1px solid var(--border); color: var(--cyan);
      padding: 0.15rem 0.5rem; border-radius: 100px; font-weight: 600;
    }

    .ai-modes {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem;
      padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
    }
    .ai-mode-btn {
      padding: 0.45rem 0.5rem; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.75rem;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.15s; text-align: center;
    }
    .ai-mode-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .ai-mode-btn.active { background: rgba(94,232,232,0.1); border-color: var(--cyan); color: var(--cyan); }

    .ai-body { flex: 1; display: flex; flex-direction: column; padding: 1rem 1.25rem; gap: 0.75rem; overflow: hidden; }

    .ai-prompt-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
    .ai-prompt {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.85rem; font-family: inherit;
      padding: 0.75rem; width: 100%; outline: none; resize: none;
      height: 90px; transition: border-color 0.2s; line-height: 1.5;
    }
    .ai-prompt::placeholder { color: var(--muted); }
    .ai-prompt:focus { border-color: var(--cyan); }

    .ai-hint { font-size: 0.7rem; color: var(--muted); }

    .ai-actions { display: flex; gap: 0.5rem; }
    .ai-send-btn {
      flex: 1; padding: 0.6rem; background: var(--cyan); color: var(--bg);
      border: none; border-radius: 7px; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    .ai-send-btn:hover { background: var(--cyan-dk); }
    .ai-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ai-use-selection-btn {
      padding: 0.6rem 0.75rem; background: transparent;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); font-size: 0.75rem; cursor: pointer;
      font-family: inherit; transition: all 0.2s; white-space: nowrap;
    }
    .ai-use-selection-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    .ai-response-wrap {
      flex: 1; display: flex; flex-direction: column; gap: 0.5rem; overflow: hidden; min-height: 0;
    }
    .ai-response-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .ai-response {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.85rem; overflow-y: auto;
      font-size: 0.82rem; line-height: 1.7; color: var(--text);
      min-height: 0;
    }
    .ai-response.empty { color: var(--muted); font-style: italic; }
    .ai-response.loading { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }
    .ai-spinner {
      width: 14px; height: 14px; border: 2px solid var(--border);
      border-top-color: var(--cyan); border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ai-insert-btn {
      padding: 0.55rem; background: transparent; border: 1px solid var(--border);
      border-radius: 7px; color: var(--muted); font-size: 0.78rem;
      cursor: pointer; font-family: inherit; transition: all 0.2s; display: none;
    }
    .ai-insert-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .ai-insert-btn.visible { display: block; }

    /* ── Draft saved toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--cyan);
      color: var(--cyan); padding: 0.6rem 1.25rem; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; }

    /* ── Link modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; display: none;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; width: 380px;
    }
    .modal-box h3 { font-size: 0.9rem; margin-bottom: 1rem; color: var(--cyan); }
    .modal-input {
      width: 100%; padding: 0.65rem 0.9rem; background: var(--bg);
      border: 1px solid var(--border); border-radius: 7px; color: var(--text);
      font-size: 0.85rem; font-family: inherit; outline: none; margin-bottom: 0.75rem;
    }
    .modal-input:focus { border-color: var(--cyan); }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>Article Builder</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="saveDraftBtn">Save Draft</button>
      <button class="btn btn-ghost" id="previewBtn">Preview</button>
      <button class="btn btn-primary" id="exportBtn">Export HTML</button>
      <button class="btn btn-danger" id="clearBtn">Clear</button>
    </div>
  </header>

  <div class="main">

    <!-- Editor Column -->
    <div class="editor-col">

      <!-- Title -->
      <div class="field-group">
        <label class="field-label">Title</label>
        <input type="text" class="title-input" id="articleTitle" placeholder="Article title..." />
      </div>

      <!-- Excerpt -->
      <div class="field-group">
        <label class="field-label">Excerpt / Preview Text</label>
        <textarea class="excerpt-input" id="articleExcerpt" placeholder="A short summary shown in previews..."></textarea>
      </div>

      <!-- Cover Image -->
      <div class="field-group">
        <label class="field-label">Cover Image</label>
        <div class="cover-drop" id="coverDrop">
          <img class="cover-preview" id="coverPreview" alt="Cover" />
          <button class="cover-remove" id="coverRemove">✕</button>
          <div class="drop-icon" id="dropIcon">🖼️</div>
          <div class="drop-label" id="dropLabel">Drop image here or click to upload</div>
          <div class="drop-sub" id="dropSub">JPG, PNG, WebP — max 5MB</div>
          <input type="file" id="coverInput" accept="image/jpeg,image/png,image/webp,image/gif" />
        </div>
      </div>

      <!-- Rich Text Editor -->
      <div class="field-group">
        <label class="field-label">Content</label>
        <div class="toolbar" id="toolbar">
          <button class="toolbar-btn" data-cmd="bold" title="Bold"><b>B</b></button>
          <button class="toolbar-btn" data-cmd="italic" title="Italic"><i>I</i></button>
          <button class="toolbar-btn" data-cmd="underline" title="Underline"><u>U</u></button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" data-cmd="h1" title="Heading 1">H1</button>
          <button class="toolbar-btn" data-cmd="h2" title="Heading 2">H2</button>
          <button class="toolbar-btn" data-cmd="h3" title="Heading 3">H3</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Bullet List">• List</button>
          <button class="toolbar-btn" data-cmd="insertOrderedList" title="Numbered List">1. List</button>
          <button class="toolbar-btn" data-cmd="blockquote" title="Blockquote">" Quote</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" data-cmd="link" title="Insert Link">🔗 Link</button>
          <button class="toolbar-btn" data-cmd="removeFormat" title="Clear Formatting">✕ Clear</button>
        </div>
        <div
          class="rich-editor"
          id="richEditor"
          contenteditable="true"
          data-placeholder="Start writing your article..."
        ></div>
      </div>

      <!-- Tags -->
      <div class="field-group">
        <label class="field-label">Tags</label>
        <input type="text" class="tags-input" id="articleTags" placeholder="astrology, tarot, vodou  (comma separated)" />
      </div>

    </div>

    <!-- AI Sidebar -->
    <div class="ai-col">
      <div class="ai-header">
        <h2>✦ AI Assistant <span class="ai-badge">Kimi</span></h2>
      </div>

      <div class="ai-modes">
        <button class="ai-mode-btn active" data-mode="write">✍️ Write</button>
        <button class="ai-mode-btn" data-mode="edit">✏️ Edit</button>
        <button class="ai-mode-btn" data-mode="expand">📖 Expand</button>
        <button class="ai-mode-btn" data-mode="summarize">📝 Summarize</button>
        <button class="ai-mode-btn" data-mode="research" style="grid-column:1/-1">🔍 Research</button>
      </div>

      <div class="ai-body">
        <div class="ai-prompt-wrap">
          <textarea
            class="ai-prompt"
            id="aiPrompt"
            placeholder="Ask the AI to write, edit, or research something..."
          ></textarea>
          <div class="ai-hint" id="aiHint">Mode: Write — describe what you want written</div>
        </div>

        <div class="ai-actions">
          <button class="ai-use-selection-btn" id="useSelectionBtn" title="Use selected text as prompt context">Use Selection</button>
          <button class="ai-send-btn" id="aiSendBtn">Generate →</button>
        </div>

        <div class="ai-response-wrap">
          <div class="ai-response-label">Response</div>
          <div class="ai-response empty" id="aiResponse">Response will appear here...</div>
          <button class="ai-insert-btn" id="aiInsertBtn">↓ Insert into Editor</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Link Modal -->
<div class="modal-backdrop" id="linkModal">
  <div class="modal-box">
    <h3>Insert Link</h3>
    <input type="text" class="modal-input" id="linkText" placeholder="Link text" />
    <input type="url" class="modal-input" id="linkUrl" placeholder="https://" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="linkCancel">Cancel</button>
      <button class="btn btn-primary" id="linkInsert">Insert</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast">Draft saved</div>

<script>
  const editor    = document.getElementById('richEditor');
  const titleEl   = document.getElementById('articleTitle');
  const excerptEl = document.getElementById('articleExcerpt');
  const tagsEl    = document.getElementById('articleTags');

  // ── Toolbar ──────────────────────────────────────────────
  document.getElementById('toolbar').addEventListener('mousedown', (e) => {
    const btn = e.target.closest('[data-cmd]');
    if (!btn) return;
    e.preventDefault();
    const cmd = btn.dataset.cmd;

    if (cmd === 'h1' || cmd === 'h2' || cmd === 'h3') {
      document.execCommand('formatBlock', false, cmd);
    } else if (cmd === 'blockquote') {
      document.execCommand('formatBlock', false, 'blockquote');
    } else if (cmd === 'link') {
      openLinkModal();
      return;
    } else {
      document.execCommand(cmd, false, null);
    }
    updateToolbarState();
  });

  editor.addEventListener('keyup', updateToolbarState);
  editor.addEventListener('mouseup', updateToolbarState);

  function updateToolbarState() {
    document.querySelectorAll('.toolbar-btn[data-cmd]').forEach(btn => {
      const cmd = btn.dataset.cmd;
      const simple = ['bold','italic','underline','insertUnorderedList','insertOrderedList'];
      if (simple.includes(cmd)) {
        btn.classList.toggle('active', document.queryCommandState(cmd));
      }
    });
  }

  // ── Link Modal ───────────────────────────────────────────
  let savedRange = null;
  function openLinkModal() {
    const sel = window.getSelection();
    if (sel.rangeCount) savedRange = sel.getRangeAt(0).cloneRange();
    document.getElementById('linkText').value = sel.toString() || '';
    document.getElementById('linkUrl').value = '';
    document.getElementById('linkModal').classList.add('open');
    document.getElementById('linkUrl').focus();
  }
  document.getElementById('linkCancel').addEventListener('click', () => {
    document.getElementById('linkModal').classList.remove('open');
  });
  document.getElementById('linkInsert').addEventListener('click', () => {
    const text = document.getElementById('linkText').value.trim();
    const url  = document.getElementById('linkUrl').value.trim();
    if (!url) return;
    editor.focus();
    if (savedRange) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedRange);
    }
    document.execCommand('insertHTML', false, `<a href="${url}" target="_blank">${text || url}</a>`);
    document.getElementById('linkModal').classList.remove('open');
  });

  // ── Cover Image ──────────────────────────────────────────
  const coverInput   = document.getElementById('coverInput');
  const coverPreview = document.getElementById('coverPreview');
  const coverRemove  = document.getElementById('coverRemove');
  const coverDrop    = document.getElementById('coverDrop');
  const dropIcon     = document.getElementById('dropIcon');
  const dropLabel    = document.getElementById('dropLabel');
  const dropSub      = document.getElementById('dropSub');

  coverInput.addEventListener('change', () => handleImage(coverInput.files[0]));

  coverDrop.addEventListener('dragover', (e) => { e.preventDefault(); coverDrop.classList.add('drag-over'); });
  coverDrop.addEventListener('dragleave', () => coverDrop.classList.remove('drag-over'));
  coverDrop.addEventListener('drop', (e) => {
    e.preventDefault();
    coverDrop.classList.remove('drag-over');
    handleImage(e.dataTransfer.files[0]);
  });

  function handleImage(file) {
    if (!file || !file.type.startsWith('image/')) return;
    if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5MB'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      coverPreview.src = e.target.result;
      coverPreview.style.display = 'block';
      coverRemove.style.display = 'flex';
      dropIcon.style.display = 'none';
      dropLabel.style.display = 'none';
      dropSub.style.display = 'none';
      coverInput.style.pointerEvents = 'none';
    };
    reader.readAsDataURL(file);
  }

  coverRemove.addEventListener('click', (e) => {
    e.stopPropagation();
    coverPreview.src = ''; coverPreview.style.display = 'none';
    coverRemove.style.display = 'none';
    dropIcon.style.display = ''; dropLabel.style.display = ''; dropSub.style.display = '';
    coverInput.value = ''; coverInput.style.pointerEvents = '';
  });

  // ── AI Sidebar ───────────────────────────────────────────
  let currentMode = 'write';
  let lastAiResponse = '';

  const modeHints = {
    write:     'Write — describe what you want written',
    edit:      'Edit — paste or select text to improve',
    expand:    'Expand — paste a short passage to develop',
    summarize: 'Summarize — paste text to condense',
    research:  'Research — ask any spiritual/astrology topic',
  };

  document.querySelectorAll('.ai-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ai-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      document.getElementById('aiHint').textContent = `Mode: ${modeHints[currentMode]}`;
    });
  });

  document.getElementById('useSelectionBtn').addEventListener('click', () => {
    const sel = window.getSelection().toString().trim();
    if (sel) {
      document.getElementById('aiPrompt').value = sel;
    }
  });

  document.getElementById('aiSendBtn').addEventListener('click', sendAiRequest);
  document.getElementById('aiPrompt').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendAiRequest();
  });

  async function sendAiRequest() {
    const prompt = document.getElementById('aiPrompt').value.trim();
    if (!prompt) return;

    const sendBtn = document.getElementById('aiSendBtn');
    const responseEl = document.getElementById('aiResponse');
    const insertBtn = document.getElementById('aiInsertBtn');

    sendBtn.disabled = true;
    sendBtn.textContent = 'Thinking...';
    responseEl.className = 'ai-response loading';
    responseEl.innerHTML = '<div class="ai-spinner"></div> Generating response...';
    insertBtn.classList.remove('visible');
    lastAiResponse = '';

    try {
      const res = await fetch('/.netlify/functions/ai-assist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, mode: currentMode }),
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        responseEl.className = 'ai-response';
        responseEl.textContent = `Error: ${data.error || 'Something went wrong.'}`;
      } else {
        lastAiResponse = data.result;
        responseEl.className = 'ai-response';
        responseEl.textContent = data.result;
        insertBtn.classList.add('visible');
      }
    } catch (err) {
      responseEl.className = 'ai-response';
      responseEl.textContent = 'Network error. Make sure KIMI_API_KEY is set in Netlify environment variables.';
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Generate →';
    }
  }

  document.getElementById('aiInsertBtn').addEventListener('click', () => {
    if (!lastAiResponse) return;
    editor.focus();
    const sel = window.getSelection();
    if (sel.rangeCount) {
      const range = sel.getRangeAt(0);
      range.collapse(false);
    }
    document.execCommand('insertText', false, '\n' + lastAiResponse);
    showToast('Inserted into editor');
  });

  // ── Save Draft ───────────────────────────────────────────
  function getDraft() {
    return {
      title:   titleEl.value,
      excerpt: excerptEl.value,
      tags:    tagsEl.value,
      content: editor.innerHTML,
      cover:   coverPreview.src || '',
      saved:   new Date().toISOString(),
    };
  }

  document.getElementById('saveDraftBtn').addEventListener('click', () => {
    localStorage.setItem('vodouizan_article_draft', JSON.stringify(getDraft()));
    showToast('Draft saved');
  });

  // Auto-save every 60s
  setInterval(() => {
    if (titleEl.value || editor.innerHTML) {
      localStorage.setItem('vodouizan_article_draft', JSON.stringify(getDraft()));
    }
  }, 60000);

  // Load draft on open
  const saved = localStorage.getItem('vodouizan_article_draft');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      titleEl.value   = d.title   || '';
      excerptEl.value = d.excerpt || '';
      tagsEl.value    = d.tags    || '';
      editor.innerHTML = d.content || '';
      if (d.cover) {
        coverPreview.src = d.cover;
        coverPreview.style.display = 'block';
        coverRemove.style.display = 'flex';
        dropIcon.style.display = 'none';
        dropLabel.style.display = 'none';
        dropSub.style.display = 'none';
      }
    } catch {}
  }

  // ── Clear ────────────────────────────────────────────────
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('Clear all content? This cannot be undone.')) return;
    titleEl.value = ''; excerptEl.value = ''; tagsEl.value = '';
    editor.innerHTML = '';
    coverRemove.click();
    localStorage.removeItem('vodouizan_article_draft');
    showToast('Cleared');
  });

  // ── Export HTML ──────────────────────────────────────────
  document.getElementById('exportBtn').addEventListener('click', () => {
    const title   = titleEl.value || 'Untitled';
    const excerpt = excerptEl.value || '';
    const tags    = tagsEl.value || '';
    const content = editor.innerHTML;
    const slug    = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

    const html = `<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>${escHtml(title)}</title>
  <meta name="description" content="${escHtml(excerpt)}" />
</head>
<body>
  <article>
    <h1>${escHtml(title)}</h1>
    ${excerpt ? `<p class="excerpt">${escHtml(excerpt)}</p>` : ''}
    ${tags ? `<p class="tags">Tags: ${escHtml(tags)}</p>` : ''}
    <div class="content">${content}</div>
  </article>
</body>
</html>`;

    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${slug || 'article'}.html`;
    a.click();
    showToast('Exported');
  });

  // ── Preview ──────────────────────────────────────────────
  document.getElementById('previewBtn').addEventListener('click', () => {
    const win = window.open('', '_blank');
    const title = titleEl.value || 'Preview';
    win.document.write(`<!doctype html><html><head>
      <meta charset="UTF-8"><title>${escHtml(title)}</title>
      <style>
        body { background:#020c10; color:#d0e8e8; font-family:Georgia,serif;
               max-width:700px; margin:3rem auto; padding:0 1.5rem; line-height:1.8; }
        h1 { font-size:2.2rem; color:#fff; margin-bottom:0.5rem; }
        h2 { color:#5ee8e8; }
        blockquote { border-left:3px solid #5ee8e8; padding-left:1rem; color:#4a6a6a; font-style:italic; }
        a { color:#5ee8e8; }
        img { max-width:100%; border-radius:8px; }
        .excerpt { color:#4a6a6a; font-style:italic; font-size:1.1rem; margin-bottom:2rem; }
      </style></head><body>
      ${coverPreview.src ? `<img src="${coverPreview.src}" style="width:100%;margin-bottom:2rem;">` : ''}
      <h1>${escHtml(title)}</h1>
      ${excerptEl.value ? `<p class="excerpt">${escHtml(excerptEl.value)}</p>` : ''}
      ${editor.innerHTML}
    </body></html>`);
    win.document.close();
  });

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
